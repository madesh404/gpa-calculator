<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GPA Calculator</title>
</head>
<body>
  <input type="file" id="csv-input" accept=".csv">
  <p id="gpa-display"></p>
  <table id="course-table">
    <thead>
      <tr>
        <th>Course</th>
        <th>Credits</th>
        <th>Grade</th>
        <th>Grade Points</th>
      </tr>
    </thead>
    <tbody id="course-tbody"></tbody>
  </table>
  <script src="app.js"></script>
</body>
</html>
